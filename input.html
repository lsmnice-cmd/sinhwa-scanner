<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>입고 등록</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family:'Malgun Gothic',sans-serif; margin:0; padding:0; background:#f0f2f5; }
  .header { background:#FF9800; color:#fff; padding:14px; display:flex; align-items:center; gap:10px; }
  .header .back { background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:18px; padding:6px 12px; border-radius:6px; cursor:pointer; }
  .header .title { font-size:18px; font-weight:bold; flex:1; text-align:center; }
  .container { max-width:520px; margin:0 auto; padding:14px; }
  .box { background:#fff; padding:14px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px; }
  .row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .row label { font-weight:bold; min-width:55px; font-size:14px; }
  label.block { display:block; font-weight:bold; font-size:14px; margin:10px 0 4px; color:#333; }
  input[type="text"], input[type="number"] { width:100%; padding:11px; font-size:16px; border:2px solid #ccc; border-radius:8px; }
  textarea { width:100%; padding:11px; font-size:14px; border:2px solid #ccc; border-radius:8px; font-family:monospace; min-height:60px; }
  .btn { color:#fff; border:none; padding:13px; width:100%; font-size:16px; font-weight:bold; border-radius:8px; margin-top:8px; cursor:pointer; }
  .btn-camera { background:#4CAF50; }
  .btn-stop { background:#E53935; display:none; }
  .btn-save { background:#2196F3; padding:16px; font-size:18px; }
  .btn-small { padding:10px; font-size:14px; width:auto; flex-shrink:0; }
  .btn-calc { background:#4CAF50; padding:16px; font-size:17px; }
  #status2 { margin-top:10px; padding:12px; border-radius:8px; font-weight:bold; text-align:center; font-size:15px; white-space:pre-line; display:none; }
  .success { background:#E8F5E9; color:#2E7D32; }
  .error { background:#FFEBEE; color:#C62828; }
  .processing { background:#FFF3E0; color:#E65100; }
  .radio-group { display:flex; gap:8px; }
  .radio-group label { flex:1; padding:11px; text-align:center; border:2px solid #ccc; border-radius:8px; cursor:pointer; font-weight:bold; }
  .radio-group input[type="radio"] { display:none; }
  .radio-group label:has(input:checked) { background:#1a73e8; border-color:#1a73e8; color:#fff; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .hint { font-size:12px; color:#888; margin-top:3px; }
  
  /* 계산기 모달 */
  .calc-modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:#263238; z-index:9999; flex-direction:column; }
  .calc-modal.active { display:flex; }
  .calc-header { background:#1a73e8; color:#fff; padding:12px; display:flex; justify-content:space-between; align-items:center; }
  .calc-header .title { font-weight:bold; font-size:16px; }
  .calc-close { background:#E53935; color:#fff; border:none; padding:8px 14px; border-radius:6px; font-weight:bold; cursor:pointer; }
  .calc-paper { flex:1; background:#fff; margin:8px; border-radius:8px; padding:8px; overflow-y:auto; font-family:'Courier New',monospace; font-size:14px; color:#333; white-space:pre-wrap; line-height:1.5; min-height:120px; max-height:25vh; }
  .calc-display { background:#000; color:#0F0; padding:14px; margin:0 8px 8px; border-radius:8px; font-family:'Courier New',monospace; font-size:32px; text-align:right; font-weight:bold; min-height:60px; }
  .calc-keypad { padding:0 8px 8px; }
  .calc-row { display:flex; gap:6px; margin-bottom:6px; }
  .calc-btn { flex:1; padding:18px 0; font-size:22px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; color:#fff; }
  .ck-num { background:#455A64; }
  .ck-num:active { background:#37474F; }
  .ck-op { background:#FF9800; }
  .ck-op:active { background:#F57C00; }
  .ck-fn { background:#78909C; font-size:18px; }
  .ck-fn.active-decimal { background:#FF9800; }
  .ck-clear { background:#E53935; }
  .ck-equal { background:#2196F3; }
  .ck-total { background:#9C27B0; }
  .ck-send { background:#4CAF50; font-size:17px; }
  .calc-btn:active { transform:scale(0.95); }
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="location.href='index.html'">← 뒤로</button>
  <span class="title">📥 입고 등록</span>
</div>

<div class="container">

  <div class="box">
    <div class="row">
      <label>작성자</label>
      <input type="text" id="workerName" value="현장팀(웹)">
    </div>
  </div>

  <div class="box">
    <label class="block">입고처 *</label>
    <input type="text" id="in_vendor" list="dl_vendors" placeholder="예: 아슬란미트">
    <datalist id="dl_vendors"></datalist>
    
    <label class="block">보관상태 *</label>
    <div class="radio-group">
      <label><input type="radio" name="storage" value="냉동" checked><span>냉동</span></label>
      <label><input type="radio" name="storage" value="냉장"><span>냉장</span></label>
      <label><input type="radio" name="storage" value="동결"><span>동결</span></label>
    </div>
    
    <label class="block">상품명 *</label>
    <input type="text" id="in_product" list="dl_products" placeholder="예: 목전지">
    <datalist id="dl_products"></datalist>
    
    <label class="block">브랜드 / 등급</label>
    <div class="grid2">
      <input type="text" id="in_brand" list="dl_brands" placeholder="브랜드">
      <input type="text" id="in_grade" list="dl_grades" placeholder="등급">
    </div>
    <datalist id="dl_brands"></datalist>
    <datalist id="dl_grades"></datalist>
    
    <label class="block">공장번호 / 원산지</label>
    <div class="grid2">
      <input type="text" id="in_factory" list="dl_factories" placeholder="공장번호">
      <input type="text" id="in_origin" list="dl_origins" placeholder="원산지">
    </div>
    <datalist id="dl_factories"></datalist>
    <datalist id="dl_origins"></datalist>
    
    <label class="block">제조일</label>
    <input type="text" id="in_mfg" placeholder="예: 20251005 (숫자 8자리)" inputmode="numeric" maxlength="8">
    
    <label class="block">이력 식별번호 (12자리)</label>
    <div style="display:flex; gap:6px;">
      <input type="text" id="in_barcode" placeholder="바코드 스캔/입력" inputmode="numeric">
      <button class="btn btn-camera btn-small" onclick="startBarcodeForInput()">📷</button>
    </div>
    <div id="reader2" style="display:none; margin-top:8px; border-radius:10px; overflow:hidden; background:#000; min-height:180px;"></div>
    <button id="stopBarcodeBtn" class="btn btn-stop" style="margin-top:6px;" onclick="stopBarcodeForInput()">바코드 스캔 중지</button>
    
    <label class="block">박스수 / 총중량 (계산기 사용 권장)</label>
    <button class="btn btn-calc" onclick="openCalculator()">🧮 계산기 열기</button>
    <div class="grid2" style="margin-top:8px;">
      <input type="number" id="in_boxcount" placeholder="박스 수" readonly style="background:#f5f5f5;">
      <input type="number" id="in_totalweight" placeholder="총중량(kg)" step="0.01" readonly style="background:#f5f5f5;">
    </div>
    <div class="hint">계산기 사용 권장. 직접 입력하려면 칸을 더블탭</div>
    
    <label class="block">상세중량 (계산기에서 자동 채워짐)</label>
    <textarea id="in_detail" placeholder="계산기를 사용하면 자동으로 채워집니다"></textarea>
    
    <div id="status2"></div>
    
    <button class="btn btn-save" onclick="saveInput()">💾 입고 내역 저장</button>
    <button class="btn" style="background:#999;" onclick="clearInputForm()">입력 초기화</button>
  </div>

</div>

<!-- 계산기 모달 -->
<div id="calcModal" class="calc-modal">
  <div class="calc-header">
    <span class="title">🧮 중량 계산기</span>
    <button class="calc-close" onclick="closeCalculator()">닫기 ✕</button>
  </div>
  <div class="calc-paper" id="calcPaper"></div>
  <div class="calc-display" id="calcDisplay">0</div>
  <div class="calc-keypad">
    <div class="calc-row">
      <button class="calc-btn ck-clear" onclick="calcClear()">C</button>
      <button class="calc-btn ck-fn" onclick="calcBackspace()">⌫</button>
      <button class="calc-btn ck-fn" id="calcDotBtn" onclick="calcToggleDecimal()" ontouchstart="calcDotLongStart(event)" ontouchend="calcDotLongEnd()">00.00</button>
      <button class="calc-btn ck-op" onclick="calcMultiply()">×</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn ck-num" onclick="calcNum('7')">7</button>
      <button class="calc-btn ck-num" onclick="calcNum('8')">8</button>
      <button class="calc-btn ck-num" onclick="calcNum('9')">9</button>
      <button class="calc-btn ck-op" onclick="calcMinus()">−</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn ck-num" onclick="calcNum('4')">4</button>
      <button class="calc-btn ck-num" onclick="calcNum('5')">5</button>
      <button class="calc-btn ck-num" onclick="calcNum('6')">6</button>
      <button class="calc-btn ck-op" onclick="calcPlus()">+</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn ck-num" onclick="calcNum('1')">1</button>
      <button class="calc-btn ck-num" onclick="calcNum('2')">2</button>
      <button class="calc-btn ck-num" onclick="calcNum('3')">3</button>
      <button class="calc-btn ck-equal" onclick="calcEqual()">=</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn ck-num" style="flex:2;" onclick="calcNum('0')">0</button>
      <button class="calc-btn ck-total" onclick="calcTotal()">★</button>
      <button class="calc-btn ck-send" onclick="calcSendBack()">📤 전송</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ 본인 앱스스크립트 URL로 수정!
  const API_URL = "https://script.google.com/macros/s/AKfycbxbhb1tD_9zJslhTS7MInKo0t5F5VfwOJwM0hXFP6CkufQsstmVgFicBOpjV86NXz9i/exec";

  // 메인에서 저장한 작성자 이름 불러오기
  const saved = localStorage.getItem('shinhwa_worker');
  if (saved) document.getElementById('workerName').value = saved;

  let html5QrCode2 = null;

  function playBeep(isError){
    try { const ctx=new (window.AudioContext||window.webkitAudioContext)(); const osc=ctx.createOscillator(); const gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type='sine'; osc.frequency.value=isError?300:900; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+0.15); osc.stop(ctx.currentTime+0.15); } catch(e){}
  }
  function speak(text){
    try { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='ko-KR'; u.rate=1.1; window.speechSynthesis.speak(u); } } catch(e){}
  }
  function vibrate(ms){ try { if (navigator.vibrate) navigator.vibrate(ms||30); } catch(e){} }

  // 바코드 스캔
  function startBarcodeForInput(){
    document.getElementById('reader2').style.display = 'block';
    document.getElementById('stopBarcodeBtn').style.display = 'block';
    if (!html5QrCode2) html5QrCode2 = new Html5Qrcode("reader2");
    html5QrCode2.start({facingMode:"environment"}, {fps:10, qrbox:{width:260,height:100}}, (decoded)=>{
      document.getElementById('in_barcode').value = decoded;
      playBeep(false);
      stopBarcodeForInput();
    }).catch(err=>{ alert("🚨 카메라 오류: " + err); });
  }
  function stopBarcodeForInput(){
    if (html5QrCode2 && html5QrCode2.isScanning) {
      html5QrCode2.stop().then(()=>{
        document.getElementById('reader2').style.display = 'none';
        document.getElementById('stopBarcodeBtn').style.display = 'none';
      }).catch(()=>{});
    } else {
      document.getElementById('reader2').style.display = 'none';
      document.getElementById('stopBarcodeBtn').style.display = 'none';
    }
  }
  function showStatus2(msg, type){
    const s = document.getElementById('status2');
    s.style.display = 'block'; s.innerText = msg; s.className = type;
  }
  function clearInputForm(){
    ['in_vendor','in_product','in_brand','in_grade','in_factory','in_origin','in_mfg','in_barcode','in_boxcount','in_totalweight','in_detail'].forEach(id=>{
      document.getElementById(id).value = '';
    });
    document.querySelector('input[name="storage"][value="냉동"]').checked = true;
    document.getElementById('status2').style.display = 'none';
  }
  async function saveInput(){
    const vendor = document.getElementById('in_vendor').value.trim();
    const product = document.getElementById('in_product').value.trim();
    if (!vendor || !product) { showStatus2("🚨 입고처와 상품명은 필수입니다.", 'error'); return; }
    const payload = {
      action: "input", vendor, product,
      storage: document.querySelector('input[name="storage"]:checked').value,
      brand: document.getElementById('in_brand').value.trim(),
      grade: document.getElementById('in_grade').value.trim(),
      factory: document.getElementById('in_factory').value.trim(),
      origin: document.getElementById('in_origin').value.trim(),
      mfgDate: document.getElementById('in_mfg').value.trim(),
      barcode: document.getElementById('in_barcode').value.trim(),
      boxCount: document.getElementById('in_boxcount').value.trim(),
      totalWeight: document.getElementById('in_totalweight').value.trim(),
      detailWeights: document.getElementById('in_detail').value.trim()
    };
    showStatus2("⏳ 저장 중...", 'processing');
    try {
      const res = await fetch(API_URL, { method:"POST", body:JSON.stringify(payload) });
      const data = await res.json();
      if (data.status === 'success') {
        playBeep(false); speak("저장 완료");
        showStatus2("✅ " + data.msg, 'success');
        setTimeout(()=>{ clearInputForm(); }, 1500);
      } else {
        playBeep(true);
        showStatus2("🚨 " + data.msg, 'error');
      }
    } catch(err){
      playBeep(true);
      showStatus2("❌ 통신 오류: " + err.message, 'error');
    }
  }
  // 자동완성
  async function loadAutoComplete(){
    try {
      const res = await fetch(API_URL + "?action=getAutoComplete");
      const data = await res.json();
      const fill = (id, arr) => {
        const dl = document.getElementById(id);
        dl.innerHTML = '';
        (arr || []).forEach(v => { const opt=document.createElement('option'); opt.value=v; dl.appendChild(opt); });
      };
      fill('dl_vendors', data.vendors); fill('dl_products', data.products);
      fill('dl_brands', data.brands); fill('dl_grades', data.grades);
      fill('dl_factories', data.factories); fill('dl_origins', data.origins);
    } catch(err){ console.log("자동완성 로드 실패:", err); }
  }
  loadAutoComplete();

  // ============ 계산기 ============
  let calcInput = "", calcTotalSum = 0, calcItemCount = 0;
  let calcDetailList = [], calcPaperLog = "";
  let calcBaseForMultiply = null, calcIsAutoDecimal = false;
  let calcDotLongTimer = null, calcDotIsLong = false;

  function openCalculator(){ document.getElementById('calcModal').classList.add('active'); calcUpdateDisplay(); calcRenderPaper(); }
  function closeCalculator(){ document.getElementById('calcModal').classList.remove('active'); }
  function calcRenderPaper(){
    const p = document.getElementById('calcPaper');
    p.innerText = calcPaperLog || "(여기에 누적 로그가 표시됩니다)";
    p.scrollTop = p.scrollHeight;
  }
  function calcAddLog(line){ calcPaperLog += (calcPaperLog ? "\n" : "") + line; calcRenderPaper(); }
  function calcFmt(num, dec){ return Number(num).toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
  function calcUpdateDisplay(){
    const d = document.getElementById('calcDisplay');
    let display;
    if (calcBaseForMultiply !== null) {
      display = String(calcBaseForMultiply) + " × " + (calcInput || "");
    } else if (!calcInput || calcInput === "0") { display = "0"; }
    else if (calcInput === "0.") { display = "0."; }
    else if (calcIsAutoDecimal) {
      const parts = calcInput.split(".");
      const intPart = parseInt(parts[0]||"0", 10);
      const formatted = intPart.toLocaleString('en-US');
      display = parts.length > 1 ? formatted + "." + parts[1] : formatted;
    } else {
      if (calcInput.endsWith(".")) { display = calcFmt(calcInput.slice(0,-1), 0) + "."; }
      else {
        const dotIdx = calcInput.indexOf(".");
        if (dotIdx >= 0) { display = Number(calcInput.slice(0,dotIdx)).toLocaleString('en-US') + "." + calcInput.slice(dotIdx+1); }
        else { display = Number(calcInput).toLocaleString('en-US'); }
      }
    }
    d.innerText = display;
  }
  function calcNum(n){
    vibrate(20);
    if (calcIsAutoDecimal) {
      let raw = calcInput.replace(".", "") + n;
      if (raw.length <= 2) calcInput = raw;
      else calcInput = raw.slice(0, raw.length-2) + "." + raw.slice(raw.length-2);
    } else { calcInput += n; }
    calcUpdateDisplay();
  }
  function calcBackspace(){
    vibrate(20);
    if (!calcInput) return;
    if (calcIsAutoDecimal) {
      let raw = calcInput.replace(".", "").slice(0,-1);
      if (!raw) calcInput = "";
      else if (raw.length <= 2) calcInput = raw;
      else calcInput = raw.slice(0, raw.length-2) + "." + raw.slice(raw.length-2);
    } else {
      calcInput = calcInput.slice(0,-1);
      if (calcInput === "." || calcInput === "-") calcInput = "";
    }
    calcUpdateDisplay();
  }
  function calcClear(){
    vibrate(30);
    calcInput = ""; calcBaseForMultiply = null;
    calcTotalSum = 0; calcItemCount = 0; calcDetailList = [];
    calcAddLog("\nC ---------------- (RESET)");
    calcUpdateDisplay();
  }
  function calcToggleDecimal(){
    if (calcDotIsLong) { calcDotIsLong = false; return; }
    vibrate(20);
    calcIsAutoDecimal = !calcIsAutoDecimal;
    const btn = document.getElementById('calcDotBtn');
    if (calcIsAutoDecimal) {
      btn.classList.add('active-decimal');
      if (calcInput && !calcInput.includes(".") && calcInput.length > 2) {
        calcInput = calcInput.slice(0, calcInput.length-2) + "." + calcInput.slice(calcInput.length-2);
      }
    } else { btn.classList.remove('active-decimal'); }
    calcUpdateDisplay();
  }
  function calcDotLongStart(e){
    e.preventDefault();
    calcDotLongTimer = setTimeout(()=>{
      calcDotIsLong = true; vibrate(50);
      if (!calcIsAutoDecimal && !calcInput.includes(".")) {
        calcInput += calcInput ? "." : "0.";
        calcUpdateDisplay();
      }
    }, 500);
  }
  function calcDotLongEnd(){ if (calcDotLongTimer) clearTimeout(calcDotLongTimer); }
  function calcMultiply(){
    vibrate(20);
    if (calcInput && calcInput !== ".") { calcBaseForMultiply = Number(calcInput); calcInput = ""; calcUpdateDisplay(); }
  }
  function calcPlus(){
    vibrate(20);
    if ((!calcInput || calcInput === ".") && calcBaseForMultiply === null) return;
    let weight, count = 1;
    if (calcBaseForMultiply !== null) { weight = calcBaseForMultiply; count = parseInt(calcInput,10)||1; calcBaseForMultiply = null; }
    else { weight = Number(calcInput); }
    const add = weight * count;
    calcTotalSum += add; calcItemCount += count;
    const wStr = weight.toFixed(2);
    for (let i=0;i<count;i++) calcDetailList.push(wStr);
    const prefix = `[${String(calcItemCount).padStart(2,'0')}]`;
    const line = count > 1 ? `${prefix} ${calcFmt(weight,2)} × ${count} = ${calcFmt(add,2)} +` : `${prefix} ${calcFmt(add,2)} +`;
    calcAddLog(line);
    calcInput = ""; calcUpdateDisplay();
  }
  function calcMinus(){
    vibrate(20);
    if ((!calcInput || calcInput === ".") && calcBaseForMultiply === null) return;
    let weight, count = 1;
    if (calcBaseForMultiply !== null) { weight = calcBaseForMultiply; count = parseInt(calcInput,10)||1; calcBaseForMultiply = null; }
    else { weight = Number(calcInput); }
    const sub = weight * count;
    calcTotalSum -= sub; calcItemCount -= count;
    const wStr = weight.toFixed(2);
    for (let i=0;i<count;i++) calcDetailList.push("-" + wStr);
    const prefix = `[${String(calcItemCount).padStart(2,'0')}]`;
    const line = count > 1 ? `${prefix} ${calcFmt(weight,2)} × ${count} = ${calcFmt(sub,2)} −` : `${prefix} ${calcFmt(sub,2)} −`;
    calcAddLog(line);
    calcInput = ""; calcUpdateDisplay();
  }
  function calcEqual(){ if (calcInput && calcInput !== ".") calcPlus(); }
  function calcTotal(){
    vibrate(20);
    if ((calcInput && calcInput !== ".") || calcBaseForMultiply !== null) calcPlus();
    calcAddLog("------------------");
    calcAddLog(`ITEM COUNT : ${calcItemCount}`);
    calcAddLog(`TOTAL      : ${calcFmt(calcTotalSum,2)} ★`);
    calcAddLog("------------------");
  }
  function calcSendBack(){
    if (calcItemCount === 0 && calcTotalSum === 0) { alert("계산된 데이터가 없습니다."); return; }
    document.getElementById('in_boxcount').value = calcItemCount;
    document.getElementById('in_totalweight').value = calcTotalSum.toFixed(2);
    document.getElementById('in_detail').value = calcDetailList.join(", ");
    calcInput = ""; calcBaseForMultiply = null;
    calcTotalSum = 0; calcItemCount = 0; calcDetailList = []; calcPaperLog = "";
    closeCalculator();
    playBeep(false);
    showStatus2("✅ 계산 결과가 입력되었습니다.", 'success');
  }
  // 읽기전용 칸 더블탭으로 직접 입력 가능
  ['in_boxcount','in_totalweight'].forEach(id=>{
    const el = document.getElementById(id);
    el.addEventListener('dblclick', ()=>{ el.removeAttribute('readonly'); el.style.background='#fff'; el.focus(); });
  });
</script>
</body>
</html>
