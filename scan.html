<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>송장 스캔</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family:'Malgun Gothic',sans-serif; margin:0; padding:0; background:#f0f2f5; }
  .header { background:#4CAF50; color:#fff; padding:14px; display:flex; align-items:center; gap:10px; }
  .header .back { background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:18px; padding:6px 12px; border-radius:6px; cursor:pointer; }
  .header .title { font-size:18px; font-weight:bold; flex:1; text-align:center; }
  .container { max-width:520px; margin:0 auto; padding:14px; }
  .box { background:#fff; padding:14px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px; }
  .row { display:flex; align-items:center; gap:8px; }
  .row label { font-weight:bold; min-width:55px; font-size:14px; }
  label.block { display:block; font-weight:bold; font-size:14px; margin:0 0 8px; color:#333; }
  input[type="text"] { width:100%; padding:11px; font-size:16px; border:2px solid #ccc; border-radius:8px; }
  .btn { color:#fff; border:none; padding:13px; width:100%; font-size:16px; font-weight:bold; border-radius:8px; margin-top:8px; cursor:pointer; }
  .btn-camera { background:#4CAF50; }
  .btn-stop { background:#E53935; display:none; }
  .btn-manual { background:#FF9800; }
  #reader { width:100%; border-radius:10px; overflow:hidden; background:#000; min-height:180px; }
  #status { margin-top:10px; padding:12px; border-radius:8px; font-weight:bold; text-align:center; font-size:15px; white-space:pre-line; display:none; }
  .success { background:#E8F5E9; color:#2E7D32; }
  .error { background:#FFEBEE; color:#C62828; }
  .processing { background:#FFF3E0; color:#E65100; }
  .log { font-size:13px; max-height:200px; overflow-y:auto; background:#FAFAFA; padding:8px; border-radius:6px; border:1px solid #eee; }
  .log div { padding:4px 0; border-bottom:1px dashed #ddd; }
  .log .ok { color:#2E7D32; }
  .log .ng { color:#C62828; }
  .camera-tip { background:#FFF8E1; color:#5D4037; padding:10px; border-radius:6px; font-size:13px; margin-bottom:8px; line-height:1.5; }
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="location.href='index.html'">← 뒤로</button>
  <span class="title">📦 송장 스캔</span>
</div>

<div class="container">

  <div class="box">
    <div class="row">
      <label>작성자</label>
      <input type="text" id="workerName" value="현장팀(웹)">
    </div>
  </div>

  <div class="box">
    <label class="block">📸 카메라 스캔</label>
    <div class="camera-tip">
      💡 <b>팁:</b> 바코드와 카메라 거리 <b>15~25cm</b>가 가장 잘 잡혀요. 포커스가 안 맞으면 화면을 <b>탭(터치)</b>해서 초점을 다시 잡아주세요.
    </div>
    <div id="reader"></div>
    <div id="status"></div>
    <button id="startBtn" class="btn btn-camera" onclick="startScanner()">카메라 켜기</button>
    <button id="stopBtn" class="btn btn-stop" onclick="stopScanner()">스캔 중지</button>
  </div>

  <div class="box">
    <label class="block">⌨️ 수동 입력 / 블루투스 스캐너</label>
    <input type="text" id="manualInput" placeholder="송장번호 입력 후 Enter" inputmode="numeric" autocomplete="off">
    <button class="btn btn-manual" onclick="submitManual()">등록하기</button>
  </div>

  <div class="box">
    <label class="block">📋 최근 등록</label>
    <div id="logBox" class="log"><div style="color:#999;">아직 없음</div></div>
  </div>

</div>

<script>
  // ⚠️ 본인 앱스스크립트 URL로 수정!
  const API_URL = "https://script.google.com/macros/s/여기에본인URL/exec";

  const saved = localStorage.getItem('shinhwa_worker');
  if (saved) document.getElementById('workerName').value = saved;

  let html5QrCode = null;
  let isProcessing = false;
  let lastSent = { code:"", time:0 };

  document.getElementById('manualInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); submitManual(); }
  });

  function speak(text){ try { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='ko-KR'; u.rate=1.1; window.speechSynthesis.speak(u); } } catch(e){} }
  function playBeep(isError){ try { const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=isError?300:900; o.start(); g.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+0.15); o.stop(ctx.currentTime+0.15); } catch(e){} }
  function showStatus(msg, type){ const s=document.getElementById('status'); s.style.display='block'; s.innerText=msg; s.className=type; }
  function addLog(code, ok, msg){
    const box = document.getElementById('logBox');
    if (box.children.length === 1 && box.children[0].style.color) box.innerHTML = '';
    const time = new Date().toLocaleTimeString('ko-KR', {hour12:false});
    const div = document.createElement('div');
    div.className = ok ? 'ok' : 'ng';
    div.innerText = `[${time}] ${ok?'✅':'🚨'} ${code} — ${msg}`;
    box.prepend(div);
  }

  // ★ 카메라 시작 (고해상도 + 자동초점)
  function startScanner(){
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    const cameraConstraints = {
      facingMode: { ideal: "environment" },
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      focusMode: "continuous",
      advanced: [{ focusMode: "continuous" }]
    };
    const scanConfig = {
      fps: 15,
      qrbox: { width: 280, height: 120 },
      aspectRatio: 1.7777,
      videoConstraints: cameraConstraints,
      experimentalFeatures: { useBarCodeDetectorIfSupported: true }
    };
    html5QrCode.start(cameraConstraints, scanConfig, onScanSuccess)
      .then(()=>{
        document.getElementById('startBtn').style.display='none';
        document.getElementById('stopBtn').style.display='block';
        applyCameraTweaks();
      })
      .catch(err=>{
        console.log("고해상도 실패, 폴백:", err);
        html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:{width:280,height:120}}, onScanSuccess)
          .then(()=>{
            document.getElementById('startBtn').style.display='none';
            document.getElementById('stopBtn').style.display='block';
          })
          .catch(e=>{ alert("🚨 카메라 오류: " + e); });
      });
  }
  
  // ★ 탭하면 그 지점에 포커스 (DSLR 터치포커스)
  function applyCameraTweaks(){
    try {
      const videoEl = document.querySelector('#reader video');
      if (!videoEl || !videoEl.srcObject) return;
      const track = videoEl.srcObject.getVideoTracks()[0];
      if (!track) return;
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.focusMode && caps.focusMode.includes('continuous')) {
        track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(()=>{});
      }
      videoEl.addEventListener('click', () => {
        if (caps.focusMode && caps.focusMode.includes('single-shot')) {
          track.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] })
            .then(()=> setTimeout(()=> track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(()=>{}), 800))
            .catch(()=>{});
        }
      });
    } catch(e) {}
  }

  function onScanSuccess(decodedText){
    if (isProcessing) return;
    const now = Date.now();
    if (decodedText === lastSent.code && (now-lastSent.time) < 3000) return;
    lastSent = { code:decodedText, time:now };
    sendToServer(decodedText);
  }

  function stopScanner(){
    if (html5QrCode && html5QrCode.isScanning) {
      html5QrCode.stop().then(()=>{
        document.getElementById('startBtn').style.display='block';
        document.getElementById('stopBtn').style.display='none';
        document.getElementById('status').style.display='none';
      }).catch(()=>{});
    }
  }

  function submitManual(){
    if (isProcessing) return;
    const input = document.getElementById('manualInput');
    const code = input.value.trim();
    if (!code) { showStatus("🚨 송장번호를 입력해주세요.", 'error'); return; }
    sendToServer(code);
    input.value = '';
    input.focus();
  }

  async function sendToServer(barcode){
    isProcessing = true;
    const workerName = document.getElementById('workerName').value || '익명';
    showStatus("⏳ 처리 중... " + barcode, 'processing');
    playBeep(false);
    try {
      const res = await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"scan", barcode:barcode, workerName:workerName}) });
      const data = await res.json();
      if (data.status === 'success') {
        speak("등록 완료");
        showStatus("✅ " + barcode + "\n" + data.msg, 'success');
        addLog(barcode, true, data.msg);
      } else {
        playBeep(true); speak(data.msg);
        showStatus("🚨 " + barcode + "\n" + data.msg, 'error');
        addLog(barcode, false, data.msg);
      }
    } catch(err){
      playBeep(true);
      showStatus("❌ 통신 오류: " + err.message, 'error');
      addLog(barcode, false, "통신오류");
    } finally {
      setTimeout(()=>{ isProcessing=false; document.getElementById('manualInput').focus(); }, 1200);
    }
  }
</script>
</body>
</html>
