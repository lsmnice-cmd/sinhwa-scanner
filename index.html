<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>신화미트 송장 스캐너</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { font-family:'Malgun Gothic',sans-serif; margin:0; padding:0; background:#f0f2f5; }
  .header { background:#1a73e8; color:#fff; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
  .container { max-width:500px; margin:0 auto; padding:16px; box-sizing:border-box; }
  .box { background:#fff; padding:16px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08); margin-bottom:16px; }
  .row { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .row label { font-weight:bold; white-space:nowrap; }
  input[type="text"] { flex:1; padding:12px; font-size:18px; border:2px solid #ccc; border-radius:8px; width:100%; box-sizing:border-box; }
  .btn { color:#fff; border:none; padding:14px; width:100%; font-size:17px; font-weight:bold; border-radius:8px; margin-top:8px; cursor:pointer; }
  .btn-camera { background:#4CAF50; }
  .btn-stop { background:#E53935; display:none; }
  .btn-manual { background:#FF9800; }
  #reader { width:100%; border-radius:12px; overflow:hidden; background:#000; min-height:200px; }
  #status { margin-top:10px; padding:14px; border-radius:8px; font-weight:bold; text-align:center; font-size:17px; white-space:pre-line; display:none; }
  .success { background:#E8F5E9; color:#2E7D32; }
  .error { background:#FFEBEE; color:#C62828; }
  .processing { background:#FFF3E0; color:#E65100; }
  .log { font-size:13px; max-height:180px; overflow-y:auto; background:#FAFAFA; padding:8px; border-radius:6px; border:1px solid #eee; }
  .log div { padding:4px 0; border-bottom:1px dashed #ddd; }
  .log .ok { color:#2E7D32; }
  .log .ng { color:#C62828; }
</style>
</head>
<body>

<div class="header">📦 신화미트 송장 스캐너</div>

<div class="container">

  <div class="box">
    <div class="row">
      <label>작성자</label>
      <input type="text" id="workerName" value="현장팀(웹)" placeholder="이름">
    </div>
  </div>

  <div class="box">
    <p style="margin:0 0 8px; font-weight:bold;">📸 카메라 스캔</p>
    <div id="reader"></div>
    <div id="status"></div>
    <button id="startBtn" class="btn btn-camera" onclick="startScanner()">카메라 켜기</button>
    <button id="stopBtn" class="btn btn-stop" onclick="stopScanner()">스캔 중지</button>
  </div>

  <div class="box">
    <p style="margin:0 0 8px; font-weight:bold;">⌨️ 수동 입력 / 블루투스 스캐너</p>
    <input type="text" id="manualInput" placeholder="송장번호 입력" inputmode="numeric" autocomplete="off">
    <button class="btn btn-manual" onclick="submitManual()">등록하기</button>
  </div>

  <div class="box">
    <p style="margin:0 0 8px; font-weight:bold;">📋 최근 등록</p>
    <div id="logBox" class="log"><div style="color:#999;">아직 없음</div></div>
  </div>

</div>

<script>
  // ⚠️ 여기에 본인의 앱스스크립트 웹앱 URL 붙여넣기!
  const API_URL = "https://script.google.com/macros/s/AKfycbxbhb1tD_9zJslhTS7MInKo0t5F5VfwOJwM0hXFP6CkufQsstmVgFicBOpjV86NXz9i/exec";

  let html5QrCode = null;
  let isProcessing = false;
  let lastSent = { code:"", time:0 };

  document.getElementById('manualInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); submitManual(); }
  });

  function speak(text){
    try {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ko-KR'; u.rate = 1.1;
        window.speechSynthesis.speak(u);
      }
    } catch(e){}
  }

  function playBeep(isError){
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = isError ? 300 : 900;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.15);
      osc.stop(ctx.currentTime + 0.15);
    } catch(e){}
  }

  function showStatus(msg, type){
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.innerText = msg;
    s.className = type;
  }

  function addLog(code, ok, msg){
    const box = document.getElementById('logBox');
    if (box.children.length === 1 && box.children[0].style.color === 'rgb(153, 153, 153)') box.innerHTML = '';
    const time = new Date().toLocaleTimeString('ko-KR', {hour12:false});
    const div = document.createElement('div');
    div.className = ok ? 'ok' : 'ng';
    div.innerText = `[${time}] ${ok?'✅':'🚨'} ${code} — ${msg}`;
    box.prepend(div);
  }

  function startScanner(){
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    const config = { fps:10, qrbox:{width:280,height:120} };
    html5QrCode.start({facingMode:"environment"}, config, onScanSuccess)
      .then(()=>{
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
      })
      .catch(err=>{
        alert("🚨 카메라 오류: " + err + "\n\n휴대폰 설정 → Chrome → 카메라 권한을 확인해주세요.");
      });
  }

  function onScanSuccess(decodedText){
    if (isProcessing) return;
    const now = Date.now();
    if (decodedText === lastSent.code && (now-lastSent.time) < 3000) return;
    lastSent = { code:decodedText, time:now };
    sendToServer(decodedText);
  }

  function stopScanner(){
    if (html5QrCode) {
      html5QrCode.stop().then(()=>{
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('status').style.display = 'none';
      }).catch(()=>{});
    }
  }

  function submitManual(){
    if (isProcessing) return;
    const input = document.getElementById('manualInput');
    const code = input.value.trim();
    if (!code) { showStatus("🚨 송장번호를 입력해주세요.", 'error'); return; }
    sendToServer(code);
    input.value = '';
    input.focus();
  }

  async function sendToServer(barcode){
    isProcessing = true;
    const workerName = document.getElementById('workerName').value || '익명';
    showStatus("⏳ 처리 중... " + barcode, 'processing');
    playBeep(false);

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        // ★ Content-Type 헤더 없이 보냄 (preflight 방지)
        body: JSON.stringify({
          action: "scan",
          barcode: barcode,
          workerName: workerName
        })
      });
      const data = await res.json();
      
      if (data.status === 'success') {
        speak("등록 완료");
        showStatus("✅ " + barcode + "\n" + data.msg, 'success');
        addLog(barcode, true, data.msg);
      } else {
        playBeep(true);
        speak(data.msg);
        showStatus("🚨 " + barcode + "\n" + data.msg, 'error');
        addLog(barcode, false, data.msg);
      }
    } catch(err){
      playBeep(true);
      showStatus("❌ 통신 오류: " + err.message, 'error');
      addLog(barcode, false, "통신오류");
    } finally {
      setTimeout(()=>{
        isProcessing = false;
        document.getElementById('manualInput').focus();
      }, 1200);
    }
  }
</script>
</body>
</html>
